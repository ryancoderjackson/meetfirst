{% extends "base.html" %}

{% block content %}
    <h1>Your Matches</h1>

    {% if match_profiles %}
        {% for item in match_profiles %}
            <div style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc;">
                <h2>{{ item.profile.display_name }}</h2>
                <p><strong>Age:</strong> {{ item.profile.age }}</p>

                <p>
                    <a href="{% url 'matches:match_detail' item.match.id %}">View Match</a>
                </p>
            </div>
        {% endfor %}
    {% else %}
        <p>You have no matches yet.</p>
    {% endif %}
{% endblock %}
