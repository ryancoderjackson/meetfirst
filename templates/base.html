<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetFirst</title>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'accounts:profile_detail' %}">My Profile</a> |
            <a href="{% url 'accounts:edit_profile' %}">Edit Profile</a> |
            <a href="{% url 'accounts:browse_profiles' %}">Browse Profiles</a> |
            <a href="{% url 'matches:matches_list' %}">Matches</a> |

            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </nav>

    <hr>
        {% if messages %}
            {% for message in messages %}
                <p><strong>{{ message }}</strong></p>
            {% endfor %}
        {% endif %}

    {% block content %}
    {% endblock %}
</body>
</html>
