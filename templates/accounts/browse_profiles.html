{% extends "base.html" %}

{% block content %}
    <h1>Browse Profiles</h1>

    {% if profiles %}
        {% for profile in profiles %}
            <div style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc;">
                <h2>{{ profile.display_name }}</h2>
                <p><strong>Age:</strong> {{ profile.age }}</p>

                <a href="{% url 'accounts:public_profile_detail' profile.id %}">View Profile</a>

                <form action="{% url 'matches:send_like' profile.id %}" method="post" style="margin-top: 10px;">
                    {% csrf_token %}
                    <button type="submit">Like</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>No more profiles available right now.</p>
    {% endif %}
{% endblock %}
